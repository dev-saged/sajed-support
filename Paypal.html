<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Sajed | ادعم ساجد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الخطوط حسب اللغة */
        .lang-ar { font-family: 'Cairo', sans-serif; }
        .lang-en { font-family: 'Inter', sans-serif; }

        /* تأثيرات الأزرار المريحة للعين */
        .price-btn {
            transition: all 0.2s ease;
            background-color: #f8fafc; /* رمادي فاتح جداً */
            color: #1e293b; 
            border: 2px solid #e2e8f0;
        }
        .price-btn:hover {
            border-color: #0070ba; /* أزرق باي بال */
            background-color: #f0f9ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 112, 186, 0.15);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 relative min-h-screen antialiased flex flex-col items-center justify-center py-10 px-4">

    <div class="bg-white w-full max-w-xl rounded-2xl shadow-xl overflow-hidden z-10">
        
        <div class="p-8 text-center border-b border-gray-100">
            <div class="w-20 h-20 mx-auto bg-blue-50 rounded-full flex items-center justify-center mb-4 text-blue-600 shadow-sm border border-blue-100">
                <i class="fa-solid fa-hand-holding-heart text-3xl"></i>
            </div>
            
            <h1 id="main-title" class="text-2xl font-bold text-gray-800 mb-2">...</h1>
            <p id="sub-title" class="text-gray-500 text-sm mb-6">...</p>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <a href="https://www.paypal.com/paypalme/FadiAbdallah992/50" target="_blank" class="price-btn rounded-xl p-3 flex flex-col items-center justify-center no-underline text-gray-800">
                    <span class="text-xl font-bold mb-1">$50</span>
                    <span id="btn-1" class="text-xs text-gray-500">...</span>
                </a>
                
                <a href="https://www.paypal.com/paypalme/FadiAbdallah992/150" target="_blank" class="price-btn rounded-xl p-3 flex flex-col items-center justify-center no-underline text-gray-800">
                    <span class="text-xl font-bold mb-1">$150</span>
                    <span id="btn-2" class="text-xs text-gray-500">...</span>
                </a>

                <a href="https://www.paypal.com/paypalme/FadiAbdallah992/200" target="_blank" class="price-btn rounded-xl p-3 flex flex-col items-center justify-center no-underline text-gray-800">
                    <span class="text-xl font-bold mb-1">$200</span>
                    <span id="btn-3" class="text-xs text-gray-500">...</span>
                </a>

                <a href="https://www.paypal.com/paypalme/FadiAbdallah992" target="_blank" class="price-btn rounded-xl p-3 flex flex-col items-center justify-center no-underline text-gray-800">
                    <i class="fa-solid fa-pen-to-square text-lg mb-1"></i>
                    <span id="btn-4" class="text-xs font-semibold">...</span>
                </a>
            </div>

            <a href="https://www.paypal.com/paypalme/FadiAbdallah992" target="_blank" class="block w-full bg-[#0070ba] hover:bg-[#005ea6] text-white font-bold py-3.5 rounded-xl transition-colors duration-200 text-lg shadow-md">
                <i class="fa-brands fa-paypal mr-2"></i> <span id="main-btn">...</span>
            </a>
            
            <p class="mt-4 text-xs text-gray-400 flex items-center justify-center gap-1">
                <i class="fa-solid fa-lock text-green-500"></i> <span id="secure-text">...</span>
            </p>
        </div>

        <div class="bg-gray-50 p-8">
            <h2 id="story-title" class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-quote-left text-blue-500 text-opacity-50"></i> 
                <span>...</span>
            </h2>
            
            <div id="story-text" class="text-gray-700 text-base leading-relaxed space-y-4">
                </div>
        </div>
        
    </div>

    <script>
        // نظام اللغات والترجمة (القصة والنصوص)
        const i18n = {
            ar: {
                title: "ادعم ساجد",
                sub: "تبرعك أو مشاركتك للرابط يصنع فارقاً حقيقياً في حياتنا.",
                btn1: "دعم أساسي",
                btn2: "دعم مؤثر",
                btn3: "دعم سخي",
                btn4: "مبلغ مخصص",
                mainBtn: "تبرع الآن عبر PayPal",
                storyTitle: "قصتي",
                storyText: `
                    <p>أنا ساجد، فلسطيني من غزة. كنت أعيش بأمان في منزلنا حتى بدأت الحرب في 7 أكتوبر، وبدأت معاناتنا. نحن ننتقل من مكان إلى آخر لأن غزة أصبحت غير آمنة.</p>
                    <p>تضرر منزلنا من القصف المستمر وأصبح غير صالح للسكن وتم تدميره، مما أجبرنا على الانتقال إلى الجنوب، تاركين كل شيء وراءنا.</p>
                    <p>نحن نعيش الآن في خيمة، بعد أن فقدنا كل وسائل الحياة الطبيعية. ومع ذلك، حتى في خيام النزوح، لم نجد الأمان وتشردنا عدة مرات، على أمل النجاة من هذه الحرب. كنت أدرس تصميم وبرمجة مواقع الويب الجامعية، لكن منذ بدء الحرب، توقف التعليم.</p>
                    <div class="bg-blue-100/50 border border-blue-200 p-4 rounded-xl mt-6 text-center">
                        <p class="font-bold text-blue-800 mb-1">شارك رابط التبرع الخاص بي. شكرًا لك.</p>
                        <p class="text-sm text-blue-700">أريد الوصول إلى أكبر عدد. ادعمني من خلال مشاركة المحتوى. ساعدني إذا استطعت، كل تبرع أو مشاركة يغير الحال.</p>
                    </div>
                `,
                secure: "دفع آمن ومباشر عبر PayPal",
                dir: "rtl",
                fontClass: "lang-ar"
            },
            en: {
                title: "Support Sajed",
                sub: "Your donation or sharing of this link makes a real difference in our lives.",
                btn1: "Basic Support",
                btn2: "Impactful Support",
                btn3: "Generous Support",
                btn4: "Custom Amount",
                mainBtn: "Donate via PayPal",
                storyTitle: "My Story",
                storyText: `
                    <p>I am Sajed, a Palestinian from Gaza. I was living safely in our house until the war started on October 7, and our suffering began. We are moving from one place to another because Gaza has become unsafe.</p>
                    <p>Our house was damaged by the continuous bombing, became uninhabitable, and was destroyed, forcing us to move to the south, leaving everything behind.</p>
                    <p>We are now living in a tent, having lost all means of normal life. However, even in the south, we did not find safety and were displaced several times, hoping to survive this war. I was studying university website design and programming, but since the war started, education has stopped.</p>
                    <div class="bg-blue-100/50 border border-blue-200 p-4 rounded-xl mt-6 text-center">
                        <p class="font-bold text-blue-800 mb-1">Share my donation link. Thank you.</p>
                        <p class="text-sm text-blue-700">I want to reach the largest number. Support me by sharing the content. Help me if you can, every donation or share makes a difference.</p>
                    </div>
                `,
                secure: "Secure direct payment via PayPal",
                dir: "ltr",
                fontClass: "lang-en"
            }
        };

        // اكتشاف لغة الجهاز
        const userLang = navigator.language || navigator.userLanguage;
        const currentLang = userLang.toLowerCase().startsWith('ar') ? 'ar' : 'en';
        const t = i18n[currentLang];

        // تطبيق الإعدادات
        document.getElementById('html-root').setAttribute('lang', currentLang);
        document.getElementById('html-root').setAttribute('dir', t.dir);
        document.body.classList.add(t.fontClass);

        // حقن النصوص
        document.getElementById('main-title').innerText = t.title;
        document.getElementById('sub-title').innerText = t.sub;
        document.getElementById('btn-1').innerText = t.btn1;
        document.getElementById('btn-2').innerText = t.btn2;
        document.getElementById('btn-3').innerText = t.btn3;
        document.getElementById('btn-4').innerText = t.btn4;
        document.getElementById('main-btn').innerText = t.mainBtn;
        document.getElementById('story-title').innerHTML = `<i class="fa-solid fa-quote-left text-blue-500 text-opacity-60 mx-2"></i> ${t.storyTitle}`;
        document.getElementById('story-text').innerHTML = t.storyText;
        document.getElementById('secure-text').innerText = t.secure;
    </script>
</body>
</html>
